<!-- 
  Variation A: Minimal Text-Only Monogram
  Font: Space Grotesk Bold (700), tracking-tighter
  Colors: foreground #0f172a (light) / #f8fafc (dark), accent #059669
  Designed for navbar at ~40px height
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
  </defs>
  <!-- "LS" monogram in Space Grotesk Bold, tight tracking -->
  <text 
    x="0" 
    y="31" 
    font-family="'Space Grotesk', sans-serif" 
    font-weight="700" 
    font-size="32" 
    letter-spacing="-2" 
    fill="#0f172a"
  >LS</text>
  <!-- Accent dot — emerald green period -->
  <circle cx="56" cy="29" r="3.5" fill="#059669"/>
</svg>
