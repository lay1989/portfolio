<!-- 
  Variation C (Dark variant): Icon + Wordmark Lockup
  For dark backgrounds
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Icon mark (inverted for dark bg) -->
  <g transform="translate(2, 2) scale(1.125)">
    <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#f8fafc"/>
    <path d="M8 7 L8 21 L16 21" 
          stroke="#0f172a" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    <line x1="16" y1="11" x2="24" y2="11" 
          stroke="#059669" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
    <line x1="14" y1="21" x2="24" y2="21" 
          stroke="#059669" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
  </g>

  <!-- Wordmark in light foreground -->
  <text 
    x="50" 
    y="28" 
    font-family="'Space Grotesk', sans-serif" 
    font-weight="700" 
    font-size="22" 
    letter-spacing="-0.5" 
    fill="#f8fafc"
  >Lay Shah</text>
</svg>
