<!-- 
  Theme-Adaptive Monogram (Variation A)
  Uses currentColor so it inherits from parent element's color,
  automatically adapting to light/dark mode. Accent dot stays emerald.
  Drop this directly into the HTML and it will work with the site's theming.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40" aria-label="LS logo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
  </defs>
  <text 
    x="0" 
    y="31" 
    font-family="'Space Grotesk', sans-serif" 
    font-weight="700" 
    font-size="32" 
    letter-spacing="-2" 
    fill="currentColor"
  >LS</text>
  <circle cx="56" cy="29" r="3.5" fill="#059669"/>
</svg>
