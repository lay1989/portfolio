<!-- 
  Variation B: Abstract Geometric Icon Mark (Favicon)
  Concept: The letters "L" and "S" are abstracted into a geometric 
  composition within a rounded square. The "L" forms a right-angle 
  bracket shape, and the "S" is suggested by the negative space 
  created by two offset emerald accent bars.
  
  Colors: 
    - Primary shape: #0f172a (slate-900, foreground)
    - Accent marks: #059669 (emerald-600, accent)
    - Background: transparent (works on any bg)
  
  Designed to be legible at 16x16 and 32x32
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded container -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#0f172a"/>
  
  <!-- Abstract "L" — clean right angle -->
  <path d="M8 7 L8 21 L16 21" 
        stroke="#f8fafc" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>
  
  <!-- Abstract "S" — two offset horizontal strokes suggesting the S curve -->
  <line x1="16" y1="11" x2="24" y2="11" 
        stroke="#059669" 
        stroke-width="3.5" 
        stroke-linecap="round"/>
  <line x1="14" y1="21" x2="24" y2="21" 
        stroke="#059669" 
        stroke-width="3.5" 
        stroke-linecap="round"/>
</svg>
