<!-- 
  Variation C: Icon + Wordmark Lockup
  Combines the geometric icon mark (Var B) with "Lay Shah" wordmark
  in Space Grotesk Bold — the same font-display used in the navbar.
  
  Layout: [icon 32px] [8px gap] [wordmark]
  Total height: ~40px (matches navbar logo area)
  
  Colors from codebase:
    - Icon bg: #0f172a (--foreground / slate-900)
    - Icon strokes: #f8fafc (--background / slate-50) + #059669 (--accent / emerald-600)
    - Wordmark: #0f172a (--foreground)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Icon mark (scaled to 36px, vertically centered) -->
  <g transform="translate(2, 2) scale(1.125)">
    <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#0f172a"/>
    <path d="M8 7 L8 21 L16 21" 
          stroke="#f8fafc" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    <line x1="16" y1="11" x2="24" y2="11" 
          stroke="#059669" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
    <line x1="14" y1="21" x2="24" y2="21" 
          stroke="#059669" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
  </g>

  <!-- Wordmark: "Lay Shah" in Space Grotesk Bold -->
  <text 
    x="50" 
    y="28" 
    font-family="'Space Grotesk', sans-serif" 
    font-weight="700" 
    font-size="22" 
    letter-spacing="-0.5" 
    fill="#0f172a"
  >Lay Shah</text>
</svg>
