<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <script src="{{BASE_PATH}}src/theme-init.js"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <meta name="description" content="{{PAGE_DESCRIPTION}}">
    <meta name="author" content="Lay Shah">

    <link rel="canonical" href="{{PAGE_CANONICAL}}">

    <!-- Social / OpenGraph -->
    {{OG_META}}
    <meta name="twitter:card" content="summary_large_image">
    {{TWITTER_META}}

    {{ARTICLE_META}}

    {{KEYWORDS_META}}

    <!-- Robots control -->
    <meta name="robots" content="index, follow">

    <!-- Structured Data -->
    {{STRUCTURED_DATA}}

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        if (!window.lucide) {
            console.warn("Primary Lucide CDN failed to load. Trying JSDelivr CDN...");
            document.write('<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"><\/script>');
        }
    </script>
    <script>
        if (!window.lucide) {
            console.warn("Secondary Lucide CDN failed. Falling back to local script.");
            document.write('<script src="{{BASE_PATH}}public/js/lucide.min.js"><\/script>');
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{BASE_PATH}}tailwind.css">
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
    <!-- Lenis smooth scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js" defer></script>
</head>
<body class="bg-background text-foreground antialiased transition-colors duration-300 overflow-x-hidden">

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 py-6 bg-transparent backdrop-blur-none border-b border-transparent data-[scrolled=true]:py-4 data-[scrolled=true]:bg-background/80 data-[scrolled=true]:backdrop-blur-sm data-[scrolled=true]:border-border" data-scrolled="false">
        {{NAV_CONTENT}}
    </nav>

    {{BODY_CONTENT}}

    <footer class="bg-background text-foreground py-8 px-6 border-t border-border">
        {{FOOTER_CONTENT}}
    </footer>

    {{PAGE_SCRIPTS}}
    <script src="{{BASE_PATH}}bundle.js" defer></script>

</body>
</html>
