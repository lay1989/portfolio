<!-- Projects Listing Page — Body Content -->
<!-- Generated filters and project cards are filled by build-html.js from projects.json -->

<main class="pt-32 pb-24 px-6">
    <div class="container mx-auto max-w-6xl">
        <!-- Page Header -->
        <div class="mb-16 reveal">
            <h1 class="text-4xl md:text-6xl font-display font-bold mb-6 text-balance">All Projects</h1>
            <p class="text-xl text-muted-foreground max-w-2xl leading-relaxed">A complete portfolio of web development case studies &mdash; from landing pages to full-stack applications.</p>
        </div>

        <!-- Filter Bar -->
        <div class="mb-12 flex flex-wrap gap-3 reveal" id="project-filters">
            <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium border border-border bg-primary text-primary-foreground transition-all duration-300" data-filter="all">All</button>
            <!-- Filter buttons are injected by build-html.js -->
            {{PROJECT_FILTER_BUTTONS}}
        </div>

        <!-- Projects Grid -->
        <div class="grid md:grid-cols-2 gap-8" id="projects-grid">
            {{PROJECT_CARDS}}
        </div>

        <!-- CTA -->
        <div class="mt-24 p-12 bg-accent/5 border border-accent/20 rounded-3xl text-center reveal">
            <h3 class="text-3xl md:text-4xl font-display font-bold mb-4 text-balance">Have a project in mind?</h3>
            <p class="text-lg text-muted-foreground mb-8 max-w-2xl mx-auto">Let&rsquo;s discuss how we can build something exceptional together.</p>
            <a href="./index.html#contact" class="inline-block px-8 py-4 bg-primary text-primary-foreground rounded-full font-medium hover:bg-accent hover:text-white transition-all duration-300 ease-out-expo magnetic-btn">Start a Project</a>
        </div>
    </div>
</main>

<!-- Filter logic (inline, page-specific) -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterBtns = document.querySelectorAll('.filter-btn');
    const projectCards = document.querySelectorAll('.project-card');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Update active state
            filterBtns.forEach(b => {
                b.classList.remove('bg-primary', 'text-primary-foreground');
                b.classList.add('bg-transparent', 'text-muted-foreground', 'hover:bg-secondary');
            });
            btn.classList.add('bg-primary', 'text-primary-foreground');
            btn.classList.remove('bg-transparent', 'text-muted-foreground', 'hover:bg-secondary');

            const filter = btn.dataset.filter;

            projectCards.forEach(card => {
                if (filter === 'all' || card.dataset.category === filter) {
                    card.style.display = '';
                    card.classList.add('reveal', 'active');
                } else {
                    card.style.display = 'none';
                }
            });
        });
    });
});
</script>
