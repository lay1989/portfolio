                    "Advanced reporting and analytics",
                    "Third-party integrations",
                    "Role-based access control",
                    "Mobile-responsive design",
                    "API for custom integrations"
                ],

                results: "Improved team productivity by 35% through automation. Successfully handled projects with up to 500 users with smooth performance. Client reported significant ROI within the first quarter of deployment.",

                metrics: {
                    productivityIncrease: "+35%",
                    userCapacity: "500+ users",
                    uptime: "99.9%",
                    responseTime: "< 200ms",
                    automationTasks: "10,000+ monthly",
                    clientSatisfaction: "95%"
                },

                screenshots: [
                    "/images/modern_e-commerce_interface_mockup.png",
                    "/images/minimalist_dark_mode_website_mockup.png"
                ],

                testimonial: {
                    quote: "TaskFlow Pro transformed how our team manages projects. The automation features alone saved us countless hours, and the intuitive interface made adoption effortless.",
                    author: "Jennifer Martinez",
                    position: "VP of Engineering, TechFlow Inc.",
                    avatar: null
                },

                lessonsLearned: "Building enterprise software requires careful consideration of scalability and user adoption. The automation engine was the most complex component, but it delivered the highest value. Investing in full testing and documentation was crucial for enterprise deployment.",

                contentImg: "/images/minimalist_dark_mode_website_mockup.png",
                websiteUrl: "#"
            }
        };

        // Load project from URL parameter
        function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const project = projects[projectId];

            if (!project) {
                document.getElementById('project-content').innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-muted-foreground mb-4">Project not found.</p>
                        <a href="/index.html#work" class="text-accent hover:text-primary transition-colors">Back to Projects</a>
                    </div>
                `;
                return;
            }

            // Update page title and meta
            document.title = `${project.title} Case Study: ${project.category} | Lay Shah`;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute('content', project.shortDesc + ' Tech stack: ' + project.tools + '. Timeline: ' + project.timeline + '.');
            }

            const content = `
                <!-- Project Header -->
                <div class="mb-12 animate-fade-up">
                    <div class="flex items-center gap-4 mb-6">
                        <span class="text-accent text-sm font-medium uppercase tracking-wider">${project.category}</span>
                        <span class="text-muted-foreground">•</span>
                        <span class="text-muted-foreground text-sm">${project.year}</span>
                    </div>
                    <h1 class="text-4xl md:text-6xl font-display font-bold mb-6 leading-tight">${project.title}</h1>
                    <p class="text-xl text-muted-foreground leading-relaxed max-w-3xl">
                        ${project.overview || project.shortDesc}
                    </p>
                </div>

                <!-- Project Hero Image -->
                <div class="rounded-xl overflow-hidden border border-border shadow-2xl mb-16 reveal">
                    <img src="${project.heroImg}" alt="${project.title}" class="w-full h-auto object-cover">
                </div>

                <!-- Project Details Grid -->
                <div class="grid md:grid-cols-3 gap-12 mb-16 reveal">
                    <div>
                        <h3 class="text-lg font-display font-bold mb-2">Role</h3>
                        <p class="text-lg text-muted-foreground leading-relaxed">${project.role}</p>
                    </div>
                    <div>
                        <h3 class="text-lg font-display font-bold mb-2">Timeline</h3>
                        <p class="text-lg text-muted-foreground leading-relaxed">${project.timeline}</p>
                    </div>
                    <div>
                        <h3 class="text-lg font-display font-bold mb-2">Tools</h3>
                        <p class="text-lg text-muted-foreground leading-relaxed">${project.tools}</p>
                    </div>
                </div>

                <!-- Project Sections -->
                <div class="space-y-20 reveal">
                    <!-- Challenge Section -->
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="target" class="w-8 h-8 text-accent"></i>
                            The Challenge
                        </h2>
                        <div class="bg-card border border-border rounded-2xl p-8 md:p-12">
                            <p class="text-lg text-muted-foreground leading-relaxed">
                                ${project.challenge}
                            </p>
                        </div>
                    </div>

                    <!-- Solution Section -->
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="lightbulb" class="w-8 h-8 text-accent"></i>
                            The Solution
                        </h2>
                        <div class="bg-card border border-border rounded-2xl p-8 md:p-12">
                            <p class="text-lg text-muted-foreground leading-relaxed mb-8">
                                ${project.solution}
                            </p>
                            ${project.contentImg ? `
                                <div class="rounded-xl overflow-hidden border border-border shadow-lg">
                                    <img src="${project.contentImg}" alt="Project Solution" class="w-full h-auto object-cover">
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Process Section -->
                    ${project.process ? `
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="workflow" class="w-8 h-8 text-accent"></i>
                            Development Process
                        </h2>
                        <div class="grid md:grid-cols-2 gap-6">
                            ${project.process.map((step, index) => `
                                <div class="bg-card border border-border rounded-xl p-6">
                                    <div class="flex items-start gap-4">
                                        <div class="flex-shrink-0 w-10 h-10 bg-accent/10 rounded-full flex items-center justify-center">
                                            <span class="text-accent font-display font-bold text-lg">${index + 1}</span>
                                        </div>
                                        <p class="text-lg text-muted-foreground leading-relaxed">${step}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Technologies Section -->
                    ${project.technologies ? `
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="code" class="w-8 h-8 text-accent"></i>
                            Technologies Used
                        </h2>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${Object.entries(project.technologies).map(([category, techs]) => `
                                <div class="bg-card border border-border rounded-xl p-6">
                                    <h3 class="text-xl font-display font-bold mb-4 capitalize text-accent">${category.replace(/([A-Z])/g, ' $1').trim()}</h3>
                                    <div class="flex flex-wrap gap-2">
                                        ${techs.map(tech => `<span class="px-4 py-1.5 bg-secondary/20 text-secondary-foreground rounded-full text-base font-medium font-display">${tech}</span>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Key Features Section -->
                    ${project.keyFeatures ? `
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="star" class="w-8 h-8 text-accent"></i>
                            Key Features
                        </h2>
                        <div class="grid md:grid-cols-2 gap-6">
                            ${project.keyFeatures.map(feature => `
                                <div class="bg-card border border-border rounded-xl p-6 flex items-start gap-4">
                                    <i data-lucide="check-circle" class="w-5 h-5 text-accent flex-shrink-0 mt-0.5"></i>
                                    <p class="text-lg text-muted-foreground leading-relaxed">${feature}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}

                    <!-- Results Section -->
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="trending-up" class="w-8 h-8 text-accent"></i>
                            Results & Impact
                        </h2>
                        <div class="bg-card border border-border rounded-2xl p-8 md:p-12">
                            <p class="text-lg text-muted-foreground leading-relaxed mb-8">
                                ${project.results}
                            </p>
                            ${project.metrics ? `
                                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    ${Object.entries(project.metrics).map(([key, value]) => `
                                        <div class="text-center">
                                            <div class="text-3xl font-bold text-accent mb-2">${value}</div>
                                            <div class="text-sm text-muted-foreground capitalize">${key.replace(/([A-Z])/g, ' $1').trim()}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Testimonial Section -->
                    ${project.testimonial ? `
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="quote" class="w-8 h-8 text-accent"></i>
                            Client Feedback
                        </h2>
                        <div class="bg-card border border-border rounded-2xl p-8 md:p-12">
                            <blockquote class="text-lg text-muted-foreground leading-relaxed mb-6 italic">
                                "${project.testimonial.quote}"
                            </blockquote>
                            <div class="flex items-center gap-4">
                                ${project.testimonial.avatar ? `<img src="${project.testimonial.avatar}" alt="${project.testimonial.author}" class="w-12 h-12 rounded-full">` : '<div class="w-12 h-12 bg-accent/10 rounded-full flex items-center justify-center"><i data-lucide="user" class="w-6 h-6 text-accent"></i></div>'}
                                <div>
                                    <div class="font-display font-bold">${project.testimonial.author}</div>
                                    <div class="text-sm text-muted-foreground">${project.testimonial.position}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    ` : ''}

                    <!-- Lessons Learned Section -->
                    ${project.lessonsLearned ? `
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="book-open" class="w-8 h-8 text-accent"></i>
                            Lessons Learned
                        </h2>
                        <div class="bg-card border border-border rounded-2xl p-8 md:p-12">
                            <p class="text-lg text-muted-foreground leading-relaxed">
                                ${project.lessonsLearned}
                            </p>
                        </div>
                    </div>
                    ` : ''}

                    <!-- Screenshots Gallery -->
                    ${project.screenshots && project.screenshots.length > 1 ? `
                    <div>
                        <h2 class="text-3xl md:text-4xl font-display font-bold mb-8 flex items-center gap-4">
                            <i data-lucide="image" class="w-8 h-8 text-accent"></i>
                            Project Gallery
                        </h2>
                        <div class="grid md:grid-cols-2 gap-8">
                            ${project.screenshots.slice(1).map(img => `
                                <div class="rounded-xl overflow-hidden border border-border shadow-lg">
                                    <img src="${img}" alt="Project Screenshot" class="w-full h-auto object-cover hover:scale-105 transition-improve duration-300">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>

                <!-- Project Links -->
                <div class="mt-20 pt-12 border-t border-border flex flex-col sm:flex-row justify-between items-center gap-6 reveal">
                    <div>
                        <h3 class="text-2xl font-display font-bold mb-2">View Live Project</h3>
                        <p class="text-muted-foreground">${project.liveUrl && project.liveUrl !== '#' ? 'Check out the live website or demo.' : 'Live preview coming soon.'}</p>
                    </div>

                    <div class="flex gap-4">
                        ${project.liveUrl && project.liveUrl !== '#' ? `
                            <a href="${project.liveUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-8 py-4 bg-primary text-primary-foreground rounded-full font-medium hover:bg-accent hover:text-white transition-all duration-300">
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                                View Live
                            </a>
                        ` : `
                            <button disabled class="inline-flex items-center gap-2 px-8 py-4 bg-muted text-muted-foreground rounded-full font-medium cursor-not-allowed opacity-50">
                                <i data-lucide="clock" class="w-4 h-4"></i>
                                Coming Soon
                            </button>
                        `}
                        ${project.githubUrl ? `
                            <a href="${project.githubUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-8 py-4 border border-border rounded-full font-medium hover:bg-accent hover:text-white transition-all duration-300">
                                <i class="fa-brands fa-github text-lg"></i>
                                View Code
                            </a>
                        ` : ''}
                    </div>
                </div>

                <!-- Social Sharing -->
                <div class="mt-12 pt-8 border-t border-border reveal">
                    <h3 class="text-lg font-bold mb-4">Share this project</h3>
                    <div class="flex gap-4">
                        <button onclick="shareOnTwitter()" class="inline-flex items-center gap-2 px-4 py-2 border border-border rounded-full hover:bg-accent hover:text-white transition-colors">
                            <i class="fa-brands fa-x-twitter text-lg"></i>
                            Twitter
                        </button>
                        <button onclick="shareOnLinkedIn()" class="inline-flex items-center gap-2 px-4 py-2 border border-border rounded-full hover:bg-accent hover:text-white transition-colors">
                            <i class="fa-brands fa-linkedin text-lg"></i>
                            LinkedIn
                        </button>
                        <button onclick="copyProjectLink()" class="inline-flex items-center gap-2 px-4 py-2 border border-border rounded-full hover:bg-accent hover:text-white transition-colors">
                            <i data-lucide="link" class="w-4 h-4"></i>
                            Copy Link
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('project-content').innerHTML = content;
            
            // Re-initialize lucide icons after content is inserted
            lucide.createIcons();
            
            // Re-run reveal animations for dynamically added elements
            const revealElements = document.querySelectorAll('.reveal');
            revealElements.forEach(el => {
                el.classList.add('active');
            });
        }

        // Load project when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProject);
        } else {
            loadProject();
        }

        // Social sharing functions
        function shareOnTwitter() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(`Check out this amazing project: ${document.title}`);
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
        }

        function shareOnLinkedIn() {
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
        }

        function copyProjectLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                // Simple feedback - could be enhanced with a toast notification
                alert('Project link copied to clipboard!');
            });
        }
    </script>
    <script src="./js/components.js"></script>
</body>
</html>
